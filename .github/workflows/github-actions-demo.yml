name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13.3'
    - run: npm ci
    - name: Enter dir and deploy
      uses: serverless/github-action@v3.2
      with:
        args: -c "cd ./backend && serverless plugin install --name serverless-wsgi && serverless plugin install --name serverless-python-requirements && serverless plugin install --name serverless-domain-manager && serverless deploy"
        entrypoint: /bin/sh
